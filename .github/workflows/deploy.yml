name: Deploy to Cloudflare

on:
  push:
    branches:
      - main      # Deploy to production on main push
      - develop   # Deploy to staging on develop push
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # JOB: Validate on PR
  # ============================================
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          cd phishguard
          bun install

      - name: TypeScript check
        run: |
          cd phishguard
          npx tsc --noEmit

      - name: Lint
        run: |
          cd phishguard
          npm run lint

  # ============================================
  # JOB: Push to GitHub (triggers Cloudflare auto-deploy)
  # ============================================
  github-push:
    name: Push to GitHub
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Only run on push to main/develop (not PR)
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push commit info to GitHub
        run: |
          echo "Push detected to ${{ github.ref }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Cloudflare Pages will auto-deploy from this push"

          # Log deployment info
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "→ Deploying to PRODUCTION (main branch)"
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "→ Deploying to STAGING (develop branch)"
          fi