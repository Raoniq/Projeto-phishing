name: Deploy to Cloudflare

on:
  push:
    branches:
      - main      # Deploy to production on main push
      - develop   # Deploy to staging on develop push
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # JOB 1: Deploy Workers (API)
  # ============================================
  deploy-workers:
    name: Deploy Workers (API)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: phishguard/package-lock.json

      - name: Install dependencies
        run: |
          cd phishguard
          npm ci

      - name: Deploy to Cloudflare Workers (Production)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENVIRONMENT: production
        run: |
          cd phishguard
          npx wrangler deploy --env production --force
        continue-on-error: true

      - name: Deploy to Cloudflare Workers (Staging)
        if: github.ref == 'refs/heads/develop'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENVIRONMENT: staging
        run: |
          cd phishguard
          npx wrangler deploy --env staging --force
        continue-on-error: true

  # ============================================
  # JOB 2: Deploy Pages (Frontend)
  # ============================================
  deploy-pages:
    name: Deploy Pages (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://pages.raoni7249.workers.dev' || 'https://staging-pages.raoni7249.workers.dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: phishguard/package-lock.json

      - name: Install dependencies
        run: |
          cd phishguard
          npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages (Production)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: phishguard
          directory: phishguard/dist
          wranglerVersion: '3'
        continue-on-error: false

      - name: Deploy to Cloudflare Pages (Staging)
        if: github.ref == 'refs/heads/develop'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: phishguard-staging
          directory: phishguard/dist
          wranglerVersion: '3'
        continue-on-error: false

  # ============================================
  # JOB 3: Type check & lint (PR validation)
  # ============================================
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: phishguard/package-lock.json

      - name: Install dependencies
        run: |
          cd phishguard
          npm ci

      - name: TypeScript check
        run: |
          cd phishguard
          npx tsc --noEmit

      - name: Lint
        run: |
          cd phishguard
          npm run lint
