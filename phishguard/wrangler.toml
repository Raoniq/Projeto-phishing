name = "phishguard-api"
main = "src/router.ts"
compatibility_date = "2026-04-21"

[env.production]
name = "phishguard-api"
routes = [
  { pattern = "api.phishguard.com.br", zone_name = "phishguard.com.br" }
]

[env.staging]
name = "phishguard-api-staging"
routes = [
  { pattern = "api-staging.phishguard.com.br", zone_name = "phishguard.com.br" }
]

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "b9e9d9c9e9d9e9d9e9d9e9d9e9d9e9d9"

[vars]
ENVIRONMENT = "development"
API_VERSION = "1.0.0"

[dev]
port = 8787
local_protocol = "http"